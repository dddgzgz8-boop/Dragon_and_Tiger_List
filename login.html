<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BESKO 管理员登录</title><style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(145deg,#f4f7f6,#eef3ff);font-family:"Microsoft YaHei",sans-serif;color:#17212b}.login{width:min(420px,calc(100% - 32px));padding:32px;background:#fff;border:1px solid #e2e8e5;border-radius:18px;box-shadow:0 18px 55px rgba(24,55,45,.12)}h1{margin:0 0 8px;font-size:24px}.muted{margin:0 0 24px;color:#7b8794;font-size:13px}label{display:block;margin:14px 0 6px;font-size:13px;font-weight:700}input,button{width:100%;height:42px;border-radius:9px;font:inherit}input{padding:0 12px;border:1px solid #d7dee5;outline:none}input:focus{border-color:#176b53;box-shadow:0 0 0 3px rgba(23,107,83,.1)}button{margin-top:20px;border:0;background:#176b53;color:#fff;font-weight:700;cursor:pointer}.status{min-height:20px;margin-top:12px;color:#c62828;font-size:13px}.back{display:block;margin-top:18px;text-align:center;color:#176b53;text-decoration:none;font-size:13px}
</style></head><body><main class="login"><h1>龙虎榜登录</h1><p class="muted">登录后查看本部门榜单 · 管理后台需管理员账号</p><form id="form"><label for="username">账号</label><select id="username" style="width:100%;height:42px;border-radius:9px;border:1px solid #d7dee5;padding:0 12px;font:inherit;outline:none"><option value="dept1">运营一部</option><option value="dept2">运营二部</option><option value="admin">管理员</option></select><label for="password">密码</label><input id="password" type="password" autocomplete="current-password" autofocus><button id="submit">登录</button><div class="status" id="status"></div></form><a class="back" href="/">返回排行榜</a></main><script>
const TOKEN_KEY='besko_local_admin_token';const params=new URLSearchParams(location.search);const next=params.get('next')||'/admin';document.getElementById('form').onsubmit=async e=>{e.preventDefault();const button=document.getElementById('submit'),status=document.getElementById('status');button.disabled=true;status.textContent='正在登录…';try{const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('username').value,password:document.getElementById('password').value})});const data=await res.json();if(!res.ok||!data.ok)throw new Error(data.error||'登录失败');localStorage.setItem(TOKEN_KEY,data.token);location.replace(next.startsWith('/')?next:'/admin')}catch(error){status.textContent=error.message;button.disabled=false}};
</script></body></html>
